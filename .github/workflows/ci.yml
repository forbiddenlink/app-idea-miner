name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    name: Quality Check
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --all-packages --dev

      - name: Lint with Ruff
        run: uv run ruff check .

      - name: Check formatting with Ruff
        run: uv run ruff format --check .

      - name: Migration Smoke Check
        env:
          PGPASSWORD: postgres
        run: |
          psql -h 127.0.0.1 -U postgres -d postgres -tc "SELECT 1 FROM pg_database WHERE datname='appideas_migration'" | grep -q 1 || \
          psql -h 127.0.0.1 -U postgres -d postgres -c "CREATE DATABASE appideas_migration"
          psql -h 127.0.0.1 -U postgres -d appideas_migration -c "CREATE EXTENSION IF NOT EXISTS vector"
          export DATABASE_URL=postgresql+asyncpg://postgres:postgres@127.0.0.1:5432/appideas_migration
          uv run alembic upgrade head

      - name: Run Unit Tests (No DB)
        env:
          ADMIN_DATABASE_URL: postgresql+asyncpg://postgres:postgres@127.0.0.1:5432/postgres
          TEST_DATABASE_URL: postgresql+asyncpg://postgres:postgres@127.0.0.1:5432/appideas_test
        run: |
          export PYTHONPATH=$PYTHONPATH:.
          uv run pytest tests/ -m "not requires_db"

      - name: Run Integration Tests (Requires DB)
        env:
          ADMIN_DATABASE_URL: postgresql+asyncpg://postgres:postgres@127.0.0.1:5432/postgres
          TEST_DATABASE_URL: postgresql+asyncpg://postgres:postgres@127.0.0.1:5432/appideas_test
        run: |
          export PYTHONPATH=$PYTHONPATH:.
          uv run pytest tests/ -m "requires_db"

  web-quality:
    name: Web Quality Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/web/package-lock.json

      - name: Install web dependencies
        run: npm ci

      - name: Lint web app
        run: npm run lint

      - name: Run unit tests
        run: npm run test:coverage

      - name: Build web app
        run: npm run build

  web-e2e:
    name: Web E2E
    runs-on: ubuntu-latest
    needs: web-quality
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/web/package-lock.json

      - name: Install web dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npm run test:e2e

  web-e2e-real-api:
    name: Web E2E Real API Contract
    runs-on: ubuntu-latest
    needs: [quality, web-quality]

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.12

      - name: Install Python dependencies
        run: uv sync --all-packages --dev

      - name: Initialize API database
        env:
          PGPASSWORD: postgres
        run: |
          psql -h 127.0.0.1 -U postgres -d postgres -tc "SELECT 1 FROM pg_database WHERE datname='appideas'" | grep -q 1 || \
          psql -h 127.0.0.1 -U postgres -d postgres -c "CREATE DATABASE appideas"

      - name: Run database migrations
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@127.0.0.1:5432/appideas
        run: uv run alembic upgrade head

      - name: Start API server
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@127.0.0.1:5432/appideas
          REDIS_URL: ""
          API_KEY: dev-api-key
        run: |
          uv run uvicorn apps.api.app.main:app --host 127.0.0.1 --port 8000 &
          echo $! > /tmp/api-server.pid
          for i in {1..40}; do
            if curl -fsS http://127.0.0.1:8000/health > /dev/null; then
              exit 0
            fi
            sleep 2
          done
          echo "API failed to start in time" >&2
          exit 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/web/package-lock.json

      - name: Install web dependencies
        working-directory: apps/web
        run: npm ci

      - name: Install Playwright browser
        working-directory: apps/web
        run: npx playwright install --with-deps chromium

      - name: Run real API contract tests
        working-directory: apps/web
        env:
          E2E_REAL_API: "1"
          E2E_API_BASE_URL: http://127.0.0.1:8000
          E2E_API_KEY: dev-api-key
        run: npm run test:e2e:contract

      - name: Stop API server
        if: always()
        run: |
          if [ -f /tmp/api-server.pid ]; then
            kill "$(cat /tmp/api-server.pid)" || true
          fi
